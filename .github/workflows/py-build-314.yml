name: Build opencv-python-headless Python 3.14t Wheel

# Thin fork build that applies opencv/opencv-python#1051 (a one-line
# setup.py patch that disables -DPYTHON3_LIMITED_API when Py_GIL_DISABLED
# is set) and produces a real cp314t-tagged wheel instead of abi3. This
# is what makes the wheel actually loadable on Windows free-threaded
# CPython (where python3.dll is not present, so abi3 wheels fail with
# "DLL load failed: specified module could not be found").

on:
  workflow_dispatch:
    inputs:
      version:
        description: "opencv-python upstream tag (defaults to 92 = PyPI 4.13.0.92)"
        required: true
        default: "92"
      package_version:
        description: "PyPI version string this corresponds to (used in wheel filename)"
        required: true
        default: "4.13.0.92"

permissions: {}

jobs:
  build:
    name: Build ${{ matrix.os }} opencv-python-headless cp314t
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform_tag: "win_amd64"
          # Linux deferred — manylinux repair for opencv is involved
          # (lots of bundled libs); add when there's actual demand.
    env:
      OPENCV_TAG: ${{ inputs.version }}
      OPENCV_PACKAGE_VERSION: ${{ inputs.package_version }}
      PYTHON_VERSION: "cpython-3.14t"
      ENABLE_HEADLESS: "1"
      ENABLE_CONTRIB: "0"
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Python 3.14t
        shell: bash
        run: uv python install "$PYTHON_VERSION"

      # Workaround scikit-build's stale free-threading detection on Windows:
      # cp314t ships libs/python314t.lib but scikit-build's CMake config asks
      # the MSVC linker for python314.lib (the GIL-enabled name). Copy the
      # t-variant to the standard name. The two .lib files export the same
      # C API surface — only GIL handling differs, and opencv's C++ doesn't
      # call GIL functions directly. Remove once scikit-build properly
      # respects Py_GIL_DISABLED.
      - name: Workaround scikit-build python314.lib name on cp314t
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $pyExe = & uv python find "$env:PYTHON_VERSION"
          if (-not $pyExe) {
            Write-Error "uv python find returned empty"
            exit 1
          }
          $pyHome = Split-Path -Parent $pyExe
          $libsDir = Join-Path $pyHome "libs"
          Write-Host "Python home: $pyHome"
          Write-Host "Libs dir contents (before):"
          Get-ChildItem $libsDir | Format-Table Name, Length

          $sourceLib = Join-Path $libsDir "python314t.lib"
          $targetLib = Join-Path $libsDir "python314.lib"
          if (-not (Test-Path $sourceLib)) {
            Write-Error "python314t.lib not found at $sourceLib"
            exit 1
          }
          if (Test-Path $targetLib) {
            Write-Host "python314.lib already exists; skipping"
          } else {
            Copy-Item $sourceLib $targetLib
            Write-Host "Copied python314t.lib -> python314.lib"
          }
          Write-Host "Libs dir contents (after):"
          Get-ChildItem $libsDir | Where-Object { $_.Name -like "python31*.lib" } | Format-Table Name, Length

          # The real fix: pyconfig.h contains `#pragma comment(lib, "python314.lib")`,
          # which the C++ compiler embeds into every .obj that includes Python.h as
          # an auto-link directive. cp314t doesn't ship python314.lib (only the
          # `t` variant), so link.exe demands the missing file and fails with
          # LNK1104 — independent of how we wire Python3_LIBRARY in CMake.
          # Rewriting the pragma to ask for python314t.lib lets link.exe satisfy
          # the auto-link from the explicit full-path arg we already pass, so it
          # no longer searches LIB at all. (LIB env var append below does not
          # propagate into MSBuild's link.exe process — MSVC's toolset init
          # resets it.)
          $pyconfigPath = Join-Path $pyHome "Include\pyconfig.h"
          if (-not (Test-Path $pyconfigPath)) {
            Write-Error "pyconfig.h not found at $pyconfigPath"
            exit 1
          }
          $content = Get-Content $pyconfigPath -Raw
          if ($content -match '"python314\.lib"') {
            $patched = $content -replace '"python314\.lib"', '"python314t.lib"'
            Set-Content -Path $pyconfigPath -Value $patched -NoNewline
            Write-Host "Patched pyconfig.h: rewrote python314.lib -> python314t.lib"
          } else {
            Write-Host "pyconfig.h has no literal 'python314.lib' (already patched or freethreaded layout differs)"
          }

          # Export paths so the build step can pin Python3_LIBRARY without re-running uv python find.
          "PY_HOME=$pyHome"      | Out-File -Append -FilePath $env:GITHUB_ENV -Encoding utf8
          "PY_LIBS_DIR=$libsDir" | Out-File -Append -FilePath $env:GITHUB_ENV -Encoding utf8

          # MSVC link.exe searches dirs listed in LIB for any *.lib it needs; appending the
          # cp314t install's libs/ lets it resolve the renamed python314.lib regardless of
          # what /LIBPATH: scikit-build passes.
          $existingLib = if ($env:LIB) { $env:LIB } else { "" }
          $newLib      = if ($existingLib) { "$existingLib;$libsDir" } else { $libsDir }
          "LIB=$newLib"          | Out-File -Append -FilePath $env:GITHUB_ENV -Encoding utf8
          Write-Host "LIB after append: $newLib"

      - name: Clone opencv-python with submodules
        shell: bash
        run: |
          set -euo pipefail
          workdir="$RUNNER_TEMP/opencv-python-build"
          echo "Cloning opencv/opencv-python at tag $OPENCV_TAG"
          git clone --recursive --depth 1 --shallow-submodules \
              --branch "$OPENCV_TAG" \
              https://github.com/opencv/opencv-python.git "$workdir"
          du -sh "$workdir"

      # The one-line PR #1051 patch: make -DPYTHON3_LIMITED_API conditional
      # on Py_GIL_DISABLED so free-threaded builds disable the Limited API
      # and produce a real cp314t-tagged binary. opencv-python's setup.py
      # already imports sysconfig, so no other changes needed.
      - name: Patch setup.py to disable Limited API on free-threaded
        shell: bash
        run: |
          set -euo pipefail
          workdir="$RUNNER_TEMP/opencv-python-build"
          before=$(grep -n 'PYTHON3_LIMITED_API=ON' "$workdir/setup.py" || true)
          echo "--- before ---"
          echo "$before"
          sed -i.bak \
              's|"-DPYTHON3_LIMITED_API=ON"|"-DPYTHON3_LIMITED_API=%s" % ("OFF" if sysconfig.get_config_var("Py_GIL_DISABLED") else "ON")|' \
              "$workdir/setup.py"
          rm -f "$workdir/setup.py.bak"
          echo "--- after ---"
          grep -n 'PYTHON3_LIMITED_API' "$workdir/setup.py"

      - name: Build wheel (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $workdir = "$env:RUNNER_TEMP\opencv-python-build"
          Set-Location "$workdir"

          # Create a cp314t venv with build deps. opencv-python's
          # pyproject.toml pins numpy==2.3.2 and setuptools<70.0.0 for
          # Python 3.14, and its custom backend at _build_backend/
          # strictly verifies those exact specs are present. Match them.
          # numpy 2.3.2 may not have a cp314t wheel on PyPI yet — uv
          # will source-build it (~5 min) if needed.
          # `pip` is required because opencv-python's setup.py imports
          # it; uv venvs don't include pip by default.
          uv venv --python="$env:PYTHON_VERSION" .venv
          uv pip install --python .venv\Scripts\python.exe `
              pip "cython>=3.1,<3.2" "setuptools<70.0.0" wheel build `
              "scikit-build>=0.14" "numpy==2.3.2" cmake ninja

          # ENABLE_HEADLESS makes setup.py produce opencv-python-headless
          # (the variant BFS2 depends on).
          $env:ENABLE_HEADLESS = "1"
          $env:ENABLE_CONTRIB = "0"

          # opencv-python's setup.py reads MAKEFLAGS / CMAKE_ARGS too.
          # Limit parallel jobs to avoid OOM on 7 GB runners.
          $env:CMAKE_BUILD_PARALLEL_LEVEL = "4"

          # Override scikit-build's FindPython3 detection so CMake points straight at
          # python314t.lib instead of asking the linker for a bare python314.lib.
          # We set every variable scikit-build / opencv's CMake might consult, plus
          # CMAKE_VERBOSE_MAKEFILE=ON so the link.exe command line shows up in any
          # future link failure log.
          #
          # NB: paths MUST use forward slashes here. scikit-build parses CMAKE_ARGS
          # with Python's shlex.split(..., posix=True), which silently consumes
          # backslashes as escape characters — turning C:\Users\... into C:Users...
          # and producing LNK1181 on a mangled path. CMake on Windows accepts
          # forward slashes everywhere.
          $libPath = (Join-Path $env:PY_LIBS_DIR "python314t.lib").Replace('\', '/')
          $incPath = (Join-Path $env:PY_HOME    "Include").Replace('\', '/')
          $env:CMAKE_ARGS = @(
              "-DPython3_LIBRARY=$libPath",
              "-DPython3_LIBRARIES=$libPath",
              "-DPython3_INCLUDE_DIR=$incPath",
              "-DPYTHON_LIBRARY=$libPath",
              "-DCMAKE_VERBOSE_MAKEFILE=ON"
          ) -join " "
          Write-Host "CMAKE_ARGS: $env:CMAKE_ARGS"

          Write-Host "Starting opencv build — expect 20-40 min..."
          .venv\Scripts\python.exe -m build --wheel --no-isolation --outdir dist

          New-Item -ItemType Directory -Force -Path "$env:GITHUB_WORKSPACE\dist" | Out-Null
          Copy-Item dist\*.whl "$env:GITHUB_WORKSPACE\dist\"

      - name: List built wheel
        shell: bash
        run: |
          ls -la "$GITHUB_WORKSPACE/dist/"
          # Confirm the wheel is actually cp314t-tagged (not abi3)
          for whl in "$GITHUB_WORKSPACE/dist"/*.whl; do
            echo "Filename: $(basename "$whl")"
            case "$(basename "$whl")" in
              *cp314t*) echo "  ✓ cp314t-tagged" ;;
              *abi3*)   echo "  ✗ STILL abi3 — patch didn't take" ; exit 1 ;;
              *)        echo "  ? unknown tag" ;;
            esac
          done

      # Upload the wheel BEFORE the smoke test. The wheel is the deliverable;
      # smoke test failures (DLL load errors, missing symbols) should not lose
      # an hour of compile. `if: always()` also covers the case where any later
      # step in this job fails — the artifact still survives.
      - name: Upload wheel artifact
        if: always() && hashFiles('dist/*.whl') != ''
        uses: actions/upload-artifact@v4
        with:
          name: opencv-python-headless-${{ matrix.platform_tag }}-cp314t-wheel
          path: dist/*.whl
          if-no-files-found: error

      # Real smoke test: install in a fresh cp314t venv and import cv2.
      # If the abi3-vs-cp314t fix worked, this load should succeed where
      # the retagged-abi3 wheel failed with "DLL load failed."
      - name: Smoke test wheel (import cv2)
        shell: bash
        run: |
          set -euo pipefail
          smoke_venv="$RUNNER_TEMP/smoke-venv"
          uv venv --python="$PYTHON_VERSION" "$smoke_venv"
          if [ "$RUNNER_OS" = "Windows" ]; then
            pyexe="$smoke_venv/Scripts/python.exe"
          else
            pyexe="$smoke_venv/bin/python"
          fi
          "$pyexe" -VV
          # Pin numpy to the same version cv2 was compiled against (2.3.2).
          # NumPy 2.x's "stable ABI" doesn't cover the _ARRAY_API PyCapsule
          # layout, so running cv2 against a newer numpy minor (e.g. 2.4.x)
          # fails with `RuntimeError: _ARRAY_API is not PyCapsule object`.
          # BFS2's installer needs the same constraint when it consumes
          # this wheel.
          uv pip install --python "$pyexe" "numpy==2.3.2" "$GITHUB_WORKSPACE"/dist/*.whl
          # -X faulthandler dumps a C-level traceback on import crashes;
          # -v shows which DLLs / modules are being loaded.
          "$pyexe" -I -X faulthandler -v -c "import cv2; print('cv2 ok, version', cv2.__version__)" 2>&1 | tail -200

      # Run only if the smoke test failed — dump the .pyd's DLL dependencies
      # so we can see what's missing (the most common failure mode is a missing
      # MSVC runtime or a Windows feature DLL).
      - name: Diagnose smoke test failure
        if: failure() && runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          $whl = Get-ChildItem "$env:GITHUB_WORKSPACE\dist\*.whl" | Select-Object -First 1
          if (-not $whl) { Write-Host "no wheel"; exit 0 }
          $extract = "$env:RUNNER_TEMP\wheel-inspect"
          if (Test-Path $extract) { Remove-Item -Recurse -Force $extract }
          Expand-Archive -Path $whl.FullName -DestinationPath $extract
          Write-Host "=== wheel contents (top-level) ==="
          Get-ChildItem $extract | Format-Table Name, Length
          $pyd = Get-ChildItem -Path $extract -Filter "cv2*.pyd" -Recurse | Select-Object -First 1
          if ($pyd) {
            Write-Host "=== cv2 .pyd: $($pyd.FullName) ($([math]::Round($pyd.Length / 1MB, 1)) MB) ==="
            $dumpbin = Get-ChildItem -Path "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Tools\MSVC" -Filter "dumpbin.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($dumpbin) {
              Write-Host "=== dumpbin /dependents ==="
              & $dumpbin.FullName /dependents $pyd.FullName
            }
          }

  publish-release:
    name: Publish wheels to GitHub Release
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      OPENCV_PACKAGE_VERSION: ${{ inputs.package_version }}
    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          path: wheels
          pattern: opencv-python-headless-*-wheel
          merge-multiple: true

      - name: List downloaded wheels
        run: ls -la wheels/

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.OPENCV_PACKAGE_VERSION }}+py314
          name: opencv-python-headless ${{ env.OPENCV_PACKAGE_VERSION }}+py314 (cp314t)
          body: |
            Free-threading-compatible (cp314t) wheels for
            `opencv-python-headless`, built with the one-line patch from
            opencv/opencv-python#1051:

                -DPYTHON3_LIMITED_API=OFF when Py_GIL_DISABLED is set

            This produces a real cp314t-tagged binary instead of abi3, so it
            actually loads under Python 3.14 free-threaded on Windows where
            `python3.dll` (the abi3 forwarder) is not present.

            Upstream tracking: <https://github.com/opencv/opencv-python/pull/1051>
            (pending merge as of build time).
          files: wheels/*.whl
          fail_on_unmatched_files: true
